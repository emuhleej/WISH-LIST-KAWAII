name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # CI has no pre-provisioned browser, so let Playwright fetch its own.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  rules:
    name: Firestore rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - name: Install system dependencies for Java
        run: |
          sudo apt-get update
          sudo apt-get install -y libgconf-2-4

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The Firestore emulator is a Java process.
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Verify Java installation
        run: java -version

      - name: Run Firestore rules tests
        run: |
          pwd
          ls -la firestore.rules
          npm run test:rules
        env:
          DEBUG: firebase-tools:*

      - name: Upload Firestore debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: firestore-debug-logs
          path: firestore-debug.log
          retention-days: 7
